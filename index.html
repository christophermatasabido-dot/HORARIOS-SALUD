<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPP · Generador de Horarios Grupales · Área de Salud</title>
<style>
:root{
  --navy:#213983; --navy-d:#18317E; --navy-dd:#101f54;
  --red:#E4133A; --red-d:#c20f30;
  --gray:#AAAAAA; --line:#e6e9f2; --line-2:#eef1f8;
  --bg:#f5f7fc; --surface:#ffffff; --ink:#1b2440; 
  --muted:#697091; --soft:#f0f3fb;
  --ok:#1f9d6b; --okbg:#e6f7ef; --warn:#c98a00; --warnbg:#fff6e0;
  --radius:16px; --radius-s:10px;
  --shadow:0 10px 30px rgba(24,49,126,.08), 0 2px 8px rgba(24,49,126,.05);
  --shadow-s:0 2px 8px rgba(24,49,126,.08);
  --font:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13px}
.hidden{display:none!important}

/* ---------- Top bar ---------- */
.topbar{position:sticky;top:0;z-index:40;background:linear-gradient(100deg,var(--navy-dd),var(--navy) 55%,var(--navy-d));
  color:#fff;display:flex;align-items:center;gap:18px;padding:12px 22px;box-shadow:0 6px 20px rgba(16,31,84,.25)}
.topbar .logo{height:46px;background:#fff;border-radius:10px;padding:5px 9px;box-shadow:var(--shadow-s)}
.topbar .titles{line-height:1.15}
.topbar .titles h1{margin:0;font-size:16px;letter-spacing:.2px;font-weight:700}
.topbar .titles p{margin:2px 0 0;font-size:11.5px;opacity:.78;font-weight:500}
.topbar .spacer{flex:1}
.period-chip{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);
  padding:7px 14px;border-radius:999px;font-size:12.5px;backdrop-filter:blur(4px)}
.period-chip b{font-weight:700}
.period-chip .dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 0 4px rgba(228,19,58,.25)}

/* ---------- Tabs ---------- */
.tabs{position:sticky;top:70px;z-index:30;display:flex;gap:4px;background:var(--surface);
  padding:8px 16px;border-bottom:1px solid var(--line);box-shadow:0 4px 14px rgba(24,49,126,.04);overflow-x:auto}
.tab{border:none;background:transparent;color:var(--muted);font-weight:600;font-size:13px;padding:10px 16px;
  border-radius:10px;white-space:nowrap;display:flex;align-items:center;gap:8px;transition:.15s}
.tab .n{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;
  background:var(--soft);color:var(--navy);font-size:11px;font-weight:700}
.tab:hover{background:var(--soft);color:var(--navy)}
.tab.active{background:var(--navy);color:#fff}
.tab.active .n{background:var(--red);color:#fff}
.tab:disabled{opacity:.4;cursor:not-allowed}

.wrap{max-width:1280px;margin:0 auto;padding:24px 22px 80px}
.section-head{display:flex;align-items:flex-end;gap:14px;margin:4px 0 18px}
.section-head h2{margin:0;font-size:22px;font-weight:800;color:var(--navy-d);letter-spacing:-.3px}
.section-head .sub{color:var(--muted);font-size:13px;margin-bottom:3px}
.section-head .bar{height:26px;width:5px;border-radius:4px;background:var(--red)}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:20px}
.card h3{margin:0 0 4px;font-size:15px;color:var(--navy-d);font-weight:700}
.card .hint{color:var(--muted);font-size:12.5px;margin:0 0 16px}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}

label.fld{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
.input,select.input{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);transition:.15s}
.input:focus,select.input:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(33,57,131,.12)}

.btn{border:none;border-radius:10px;padding:11px 18px;font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:8px;transition:.15s}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy-d)}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:var(--red-d)}
.btn-ghost{background:var(--soft);color:var(--navy-d)}
.btn-ghost:hover{background:#e3e9f9}
.btn-line{background:#fff;border:1.5px solid var(--line);color:var(--navy-d)}
.btn-line:hover{border-color:var(--navy);background:var(--soft)}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:9px}

/* Licenciatura cards */
.lic-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
.lic-card{border:2px solid var(--line);border-radius:14px;padding:18px;cursor:pointer;transition:.15s;background:#fff;position:relative;overflow:hidden}
.lic-card:hover{border-color:var(--navy);transform:translateY(-2px);box-shadow:var(--shadow)}
.lic-card.sel{border-color:var(--navy);background:linear-gradient(180deg,#fff, #f4f7ff)}
.lic-card.sel::after{content:'✓';position:absolute;top:10px;right:12px;width:24px;height:24px;background:var(--navy);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.lic-card .ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:10px}
.lic-card h4{margin:0 0 3px;font-size:15px;color:var(--navy-d)}
.lic-card p{margin:0;font-size:12px;color:var(--muted)}

/* chips for cuatris/grupos */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:8px 15px;font-weight:700;font-size:13px;color:var(--navy-d);transition:.15s}
.chip:hover{border-color:var(--navy)}
.chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.chip .tg{font-size:10.5px;opacity:.8;font-weight:600;margin-left:5px}

.pill{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;letter-spacing:.3px}
.pill.pres{background:#eaf0ff;color:var(--navy-d)}
.pill.asin{background:#ede7fb;color:#5b3aa6}
.pill.clin{background:#fde7eb;color:var(--red-d)}
.pill.warn{background:var(--warnbg);color:var(--warn)}
.pill.ok{background:var(--okbg);color:var(--ok)}

/* Subject table */
.subtable{width:100%;border-collapse:collapse;margin-top:6px}
.subtable th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);text-align:left;padding:8px 10px;border-bottom:2px solid var(--line)}
.subtable td{padding:7px 10px;border-bottom:1px solid var(--line-2);vertical-align:middle}
.subtable tr:hover td{background:#fafbff}
.subtable .clave{font-variant-numeric:tabular-nums;font-weight:700;color:var(--navy);font-size:12px}
.subtable .nm{font-weight:600;font-size:13px}
.subtable .ser{font-size:10.5px;color:var(--warn);margin-top:2px}
.subtable input.cell{width:100%;border:1px solid transparent;background:transparent;border-radius:7px;padding:6px 8px}
.subtable input.cell:hover{border-color:var(--line)}
.subtable input.cell:focus{outline:none;border-color:var(--navy);background:#fff;box-shadow:0 0 0 3px rgba(33,57,131,.1)}
.subtable select.modsel{border:1px solid var(--line);border-radius:7px;padding:5px 6px;font-size:11px;font-weight:700}
.hcount{font-weight:800;font-size:13px;font-variant-numeric:tabular-nums}

/* Weekly grid */
.gridwrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
table.week{border-collapse:collapse;width:100%;min-width:680px;table-layout:fixed}
table.week th{background:var(--navy);color:#fff;font-size:12px;font-weight:700;padding:10px 6px;text-align:center;border:1px solid var(--navy-d)}
table.week th.hh{width:92px;background:var(--navy-dd)}
table.week td.hh{background:var(--soft);font-weight:700;font-size:11px;color:var(--navy-d);text-align:center;border:1px solid var(--line);font-variant-numeric:tabular-nums;white-space:nowrap}
table.week td.slot{border:1px solid var(--line);padding:4px 6px;height:44px;text-align:center;
  font-size:11px;font-weight:700;color:#fff;cursor:pointer;transition:box-shadow .12s, background .12s;
  text-overflow:ellipsis;overflow:hidden;white-space:nowrap;line-height:1.15}
table.week td.slot.empty{color:#c7cde0;background:#fff!important;position:relative}
table.week td.slot.empty::after{content:'+';opacity:0;font-size:18px;color:var(--navy);font-weight:800;transition:.12s}
table.week td.slot.empty:hover{background:var(--soft)!important}
table.week td.slot.empty:hover::after{opacity:.55}
table.week td.slot.dragover{box-shadow:inset 0 0 0 3px var(--navy)}
table.week td.slot.armable{box-shadow:inset 0 0 0 2px rgba(33,57,131,.45);cursor:copy}
table.week td.cont{position:relative}
table.week td.cont::before{content:'⋮';position:absolute;left:6px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.6);font-size:13px}
table.week td.slot.block{vertical-align:middle;white-space:normal;line-height:1.18}
table.week td.slot.block .blab{display:block}
table.week td.slot.block .bspan{display:block;font-size:9px;font-weight:700;opacity:.85;margin-top:3px;letter-spacing:.02em}

.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;align-items:center}
.legend .it{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}
.legend .sw{width:16px;height:16px;border-radius:5px;border:1px solid rgba(0,0,0,.08)}

.counters{display:flex;flex-wrap:wrap;gap:9px;margin-top:14px}
.cnt{display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);border-radius:10px;padding:8px 12px;font-size:12px;background:#fff;cursor:grab;user-select:none;transition:.12s}
.cnt:hover{border-color:var(--navy);box-shadow:var(--shadow-s)}
.cnt:active{cursor:grabbing}
.cnt .grip{color:var(--gray);font-size:13px;margin-right:-2px}
.cnt .sw{width:12px;height:12px;border-radius:4px}
.cnt b{font-variant-numeric:tabular-nums}
.cnt.done{border-color:var(--ok);background:var(--okbg)}
.cnt.over{border-color:var(--red);background:#fde7eb}
.cnt.armed{outline:2px solid var(--navy);outline-offset:1px;background:var(--soft)}
.markhint{flex-basis:100%;font-size:11.5px;color:var(--muted);margin-bottom:2px;display:flex;align-items:center;gap:7px}
.markhint .b{background:#eaf0ff;color:var(--navy-d);font-weight:700;border-radius:6px;padding:1px 7px}

.grp-block{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:12px;background:#fff}
.grp-title{font-weight:800;color:var(--navy-d);font-size:13px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.grp-title::before{content:'';width:4px;height:14px;border-radius:3px;background:var(--red)}
.grp-title .tn{font-size:11px;font-weight:700;color:#fff;background:var(--navy);padding:2px 9px;border-radius:999px}

.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-state .big{font-size:40px;margin-bottom:10px;opacity:.5}
.empty-state h3{color:var(--navy-d);margin:0 0 6px}

.note{display:flex;gap:12px;background:var(--soft);border:1px solid var(--line);border-left:4px solid var(--navy);border-radius:10px;padding:13px 15px;font-size:12.5px;color:#3c456b;margin-bottom:14px}
.note.amber{background:var(--warnbg);border-left-color:var(--warn);color:#7a5a10}
.note .i{font-size:16px;line-height:1}
details.note{display:block}
details.note summary{cursor:pointer;font-weight:700;color:var(--navy-d);list-style:none}
details.note summary::-webkit-details-marker{display:none}
details.note ul{margin:10px 0 0;padding-left:18px}
details.note li{margin-bottom:6px}

.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
.toolbar .spacer{flex:1}

.tag{font-size:11px;font-weight:700;color:var(--muted);background:var(--soft);padding:4px 10px;border-radius:7px}

.list-item{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px;background:#fff;transition:.15s}
.list-item:hover{border-color:var(--navy);box-shadow:var(--shadow-s)}
.list-item .ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--soft);color:var(--navy)}
.list-item .main{flex:1}
.list-item .main .t{font-weight:700;color:var(--navy-d)}
.list-item .main .d{font-size:12px;color:var(--muted)}

.attach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.attach{border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;cursor:pointer;transition:.15s;display:flex;gap:9px;align-items:center}
.attach:hover{border-color:var(--navy)}
.attach.on{border-color:var(--ok);background:var(--okbg)}
.attach input{accent-color:var(--navy)}
.attach .t{font-weight:700;font-size:12.5px}
.attach .s{font-size:11px;color:var(--muted)}

.conflict-banner{background:#fde7eb;border:1px solid var(--red);color:var(--red-d);border-radius:10px;padding:10px 14px;font-size:12.5px;font-weight:600;margin-top:12px;display:flex;gap:8px;align-items:center}
table.week td.slot.conf{box-shadow:inset 0 0 0 3px var(--red);}
table.week td.slot.tconf{outline:2px dashed var(--red); outline-offset:-5px; box-shadow:inset 0 0 0 3px var(--red);}
.hours-ctl{display:flex;flex-direction:row;align-items:center;gap:6px;background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:6px 9px;margin-left:8px}
.hours-ctl .hc-lbl{font-size:10px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
.hours-ctl .btn{padding:5px 9px;font-size:11px}

.kbd{font-size:11px;background:#fff;border:1px solid var(--line);border-bottom-width:2px;border-radius:6px;padding:1px 6px;font-weight:700;color:var(--navy-d)}

/* Print */
#printArea{display:none}
@media print{
  *{ -webkit-print-color-adjust:exact!important; print-color-adjust:exact!important; }
  body{background:#fff}
  .topbar,.tabs,.wrap,.no-print{display:none!important}
  #printArea{display:block!important}
  @page{size:letter landscape;margin:8mm 11mm}
  .psheet{page-break-after:always}
  .psheet:last-child{page-break-after:auto}
  .psheet{padding-top:0}
}
.psheet{font-family:var(--font);color:var(--ink);padding:2px}
.phead{position:relative;display:flex;align-items:center;gap:16px;overflow:hidden;
  background:linear-gradient(100deg,var(--navy-dd),var(--navy) 58%,var(--navy-d));
  color:#fff;border-radius:14px;padding:14px 20px;margin-bottom:14px}
.phead::before{content:'';position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,var(--red) 0%,rgba(228,19,58,0) 70%);opacity:.55}
.phead .plogo{height:50px;background:#fff;border-radius:10px;padding:5px 8px;flex:none;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.phead .pt1{font-size:15px;font-weight:800;letter-spacing:.2px}
.phead .pt2{font-size:12px;opacity:.85;margin-top:2px;font-weight:500}
.phead .pcycle{margin-left:auto;text-align:right;z-index:1}
.phead .pcycle .c1{font-size:10px;text-transform:uppercase;letter-spacing:1.4px;opacity:.82}
.phead .pcycle .c2{font-size:21px;font-weight:800;line-height:1.05}
.pmeta{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 6px}
.pmeta .m{background:var(--soft);border:1px solid var(--line);border-left:3px solid var(--navy);
  border-radius:9px;padding:6px 12px;line-height:1.25}
.pmeta .m .k{display:block;font-size:8.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:700}
.pmeta .m .v{font-size:12px;font-weight:800;color:var(--navy-d)}
.psec{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  color:var(--navy-d);margin:13px 0 6px;display:flex;align-items:center;gap:8px}
.psec::before{content:'';width:4px;height:14px;border-radius:3px;background:var(--red)}
table.ptable{border-collapse:separate;border-spacing:0;width:100%;font-size:10.5px;
  border:1px solid var(--line);border-radius:10px;overflow:hidden}
table.ptable th{background:linear-gradient(180deg,var(--navy),var(--navy-d));color:#fff;
  font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;padding:7px 9px;text-align:left}
table.ptable td{padding:6px 9px;border-top:1px solid var(--line-2)}
table.ptable tbody tr:nth-child(odd) td{background:#fafbff}
table.ptable .pc{font-weight:800;font-variant-numeric:tabular-nums}
table.pweek{border-collapse:separate;border-spacing:0;width:100%;margin-top:2px;
  font-size:10px;table-layout:fixed;border:1px solid var(--line);border-radius:10px;overflow:hidden}
table.pweek th{background:linear-gradient(180deg,var(--navy),var(--navy-d));color:#fff;
  padding:7px 4px;font-size:9.5px;text-transform:uppercase;letter-spacing:.3px}
table.pweek th.phh{width:78px;background:var(--navy-dd)}
table.pweek td{padding:5px 4px;text-align:center;height:30px;border-top:2px solid #fff;border-left:2px solid #fff;font-weight:600;color:#fff}
table.pweek td.phh{background:var(--soft);color:var(--navy-d);font-weight:700;font-size:9px;font-variant-numeric:tabular-nums;border-left:none}
table.pweek td.pempty{background:#f7f9fe}
.pfoot{margin-top:11px;display:flex;justify-content:space-between;gap:12px;font-size:9px;color:var(--muted);
  border-top:1px solid var(--line);padding-top:7px}
.pfoot b{color:var(--navy-d)}

</style>
</head>
<body>

  <img id="logoTop" class="logo" alt="UPP">
  <div class="titles">
    <h1>Generador de Horarios Grupales</h1>
    <p>Área de Salud · Nutrición · Odontología · Terapia Física y Rehabilitación</p>

  <div class="spacer"></div>
  <div class="period-chip" id="periodChip"></div>
</header>
<nav class="tabs no-print" id="tabs"></nav>
<main class="wrap" id="main"></main>
<div id="printArea"></div>

<script>
/* ============================================================
   UPP · Generador de Horarios Grupales — Área de Salud
   Lógica de aplicación (vanilla JS)
   ============================================================ */
'use strict';
const PLAN = window.PLAN;
const LICS = Object.keys(PLAN); // Odontología, Nutrición, Terapia Física y Rehabilitación
const LIC_META = {
  'Odontología':{ic:'🦷',ab:'ODO',col:'#213983'},
  'Nutrición':{ic:'🥗',ab:'NUT',col:'#1f9d6b'},
  'Terapia Física y Rehabilitación':{ic:'🦿',ab:'TFR',col:'#c98a00'}
};
const DIAS = ['Lunes','Martes','Miércoles','Jueves','Viernes'];
/* ------------------------------------------------------------------
   Modelo de horas con ÍNDICE ABSOLUTO de módulo (idx = horaInicio - BASE_H).
   Anclar el índice a la hora del reloj permite ampliar o recortar horas
   al inicio de un grupo SIN desplazar las materias ya colocadas, y permite
   comparar el horario de un docente entre turnos (mismo idx = misma hora real).
   ------------------------------------------------------------------ */
const BASE_H = 6;    // 06:00 corresponde al módulo idx 0
const MIN_H  = 6;    // hora más temprana permitida para entrar (06:00)
const MAX_H  = 22;   // último bloque permitido: 22:00–23:00
const TURNOS = {
  M:{nom:'Matutino',   t0:7,  t1:15},   // ventana por defecto 07:00–15:00 (8 módulos)
  V:{nom:'Vespertino', t0:15, t1:21}    // ventana por defecto 15:00–21:00 (6 módulos)
};
function hourLabel(h){ const p=n=>String(n).padStart(2,'0'); return `${p(h)}:00 - ${p(h+1)}:00`; }
function winOf(obj){ const t=TURNOS[obj.turno]; return { t0:(obj.t0!=null?obj.t0:t.t0), t1:(obj.t1!=null?obj.t1:t.t1) }; }
function modsOf(obj){ const w=winOf(obj); const a=[]; for(let h=w.t0; h<w.t1; h++) a.push({h, idx:h-BASE_H, label:hourLabel(h)}); return a; }
function winLabel(obj){ const w=winOf(obj); const p=n=>String(n).padStart(2,'0'); return `${p(w.t0)}:00–${p(w.t1)}:00`; }
/* Paleta formal y sobria (tonos apagados, todos con suficiente contraste para texto blanco). */
const PALETTE = ['#2c3e6b','#3f5e8a','#41706a','#7d6a3e','#634a73','#8a5a40','#3a6379','#5c6b45','#7a4b4b','#4f5a6e','#566f8a','#436b63','#6e5638','#52617a'];
const ACTIVE_BY_PART = {1:[1,4,7],2:[2,5,8],3:[3,6,9]};
const PART_LABEL = {1:'Septiembre – Diciembre',2:'Enero – Abril',3:'Mayo – Agosto'};

/* ---------- State ---------- */
const LS_KEY = 'upp_horarios_v1';
let S = loadState();
function blankState(){
  return { setup:{lic:'Odontología', anio:27, parte:1}, grupos:{}, recurses:{}, alumnos:{},
           ui:{tab:0, gCuatri:null, gGrupo:null, alumnoSel:null, armed:null} };
}
function loadState(){
  try{ const r=localStorage.getItem(LS_KEY); if(r){const o=JSON.parse(r); if(o&&o.setup) return migrateState(o);} }catch(e){}
  return blankState();
}
/* Migra estados previos: los alumnos guardaban grupos completos {type,id};
   ahora se guardan materias individuales {type,id,sub}. */
function migrateState(o){
  try{
    if(!o.ui) o.ui={}; if(typeof o.ui.armed==='undefined') o.ui.armed=null;
    /* Migración de horario: versiones previas guardaban el índice de módulo
       relativo al inicio del turno (0 = 07:00 en matutino, 0 = 15:00 en vespertino).
       Ahora el índice es absoluto (idx = horaInicio - 6). Se desplaza una sola vez. */
    if(!o._tv){
      const shift = obj => {
        if(!obj || !obj.grid) return;
        const off = (obj.turno==='V') ? (15-BASE_H) : (7-BASE_H); // V:+9, M:+1
        const ng={};
        for(const k in obj.grid){ const parts=k.split('-'); const di=parts[0], mi=parseInt(parts[1],10);
          if(isNaN(mi)) continue; ng[di+'-'+(mi+off)]=obj.grid[k]; }
        obj.grid=ng;
      };
      Object.values(o.grupos||{}).forEach(shift);
      Object.values(o.recurses||{}).forEach(shift);
      o._tv=1;
    }
    Object.values(o.alumnos||{}).forEach(a=>{
      if(!Array.isArray(a.items)){ a.items=[]; return; }
      const out=[];
      a.items.forEach(it=>{
        if(it && it.sub){ out.push(it); return; }
        const obj = it && (it.type==='g'?o.grupos[it.id]:o.recurses[it.id]);
        if(obj && obj.subjects){ obj.subjects.forEach(s=> out.push({type:it.type,id:it.id,sub:(s.clave||s.nombre)})); }
      });
      a.items=out;
    });
  }catch(e){}
  return o;
}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){} }

/* ---------- Helpers ---------- */
function periodLabel(){ const a=S.setup.anio, p=S.setup.parte;
  const y = (p===1) ? 1999+a : 2000+a;
  return `${PART_LABEL[p]} ${y}`; }
function periodYearShort(){ const a=S.setup.anio, p=S.setup.parte; return (p===1)?1999+a:2000+a; }
function cycleCode(){ return `${S.setup.anio}/${S.setup.parte}`; }
function activeCuatris(){ return ACTIVE_BY_PART[S.setup.parte]; }
function groupId(lic,cuatri,grupo){ return `${LIC_META[lic].ab}-${cuatri}${grupo}`; }
function groupCode(g){ return `${g.cuatri}${g.grupo}${g.turno}`; } // ej. 3AM
function subId(s){ return s.clave || s.nombre; }
function modPill(m){ const map={PRES:['pres','Presencial'],ASIN:['asin','Asincrónica'],CLIN:['clin','Clínica']}; const x=map[m]||map.PRES; return `<span class="pill ${x[0]}">${x[1]}</span>`; }
function esc(t){ return (t==null?'':String(t)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function prereqName(lic,clave){ if(!clave) return ''; for(const c in PLAN[lic]) for(const s of PLAN[lic][c]) if(s.clave===clave) return s.nombre; return clave; }

/* color for a subject within a group/recurse (stable by index) */
function subColor(idx){ return PALETTE[idx%PALETTE.length]; }

/* ============================================================
   DOCENTES — normalización y detección de empalmes entre grupos
   ============================================================ */
function normDoc(d){ return (d||'').trim().toLowerCase().replace(/\s+/g,' '); }
function subById(obj,sub){ return obj.subjects.find(x=>subId(x)===sub); }
function docenteOf(obj,sub){ const s=subById(obj,sub); return s?(s.docente||''):''; }
/* Todos los objetos con cuadrícula (grupos + recurses). */
function allSchedObjs(){ return Object.values(S.grupos).concat(Object.values(S.recurses)); }
/* Devuelve otros objetos donde el MISMO docente ya ocupa el día/módulo (di-mi) indicado.
   Como el índice de módulo es absoluto, esto detecta empalmes incluso entre turnos distintos. */
function teacherConflictsAt(excludeId, di, mi, docente){
  const nd=normDoc(docente); if(!nd) return [];
  const key=di+'-'+mi, out=[];
  allSchedObjs().forEach(obj=>{
    if(obj.id===excludeId) return;
    const sub=obj.grid[key]; if(!sub) return;
    if(normDoc(docenteOf(obj,sub))===nd) out.push({obj,sub});
  });
  return out;
}
function objLabel(obj){ return obj.grupo ? `${obj.lic.split(' ')[0]} ${groupCode(obj)}` : 'recurse'; }
/* ¿La celda (obj,di,mi) está en empalme de docente con algún otro objeto? */
function cellTeacherConflict(obj,di,mi){
  const sub=obj.grid[di+'-'+mi]; if(!sub) return false;
  const doc=docenteOf(obj,sub); if(!normDoc(doc)) return false;
  return teacherConflictsAt(obj.id,di,mi,doc).length>0;
}
/* Lista global de empalmes de docente (para avisos). Cada empalme: {doc, di, mi, objs:[...]} */
function allTeacherConflicts(){
  const map={}; // doc|di-mi -> [{obj,sub}]
  allSchedObjs().forEach(obj=>{ for(const k in obj.grid){ const sub=obj.grid[k]; const nd=normDoc(docenteOf(obj,sub));
    if(!nd) continue; const mk=nd+'|'+k; (map[mk]=map[mk]||[]).push({obj,sub,doc:docenteOf(obj,sub),k}); } });
  const res=[];
  for(const mk in map){ if(map[mk].length>1){ const parts=map[mk][0].k.split('-');
    res.push({doc:map[mk][0].doc, di:parseInt(parts[0],10), mi:parseInt(parts[1],10), objs:map[mk]}); } }
  return res;
}

/* ============================================================
   GRUPOS — creación y modelo
   ============================================================ */
function buildSubjects(lic,cuatri){
  return PLAN[lic][cuatri].map((s,i)=>({
    clave:s.clave, nombre:s.nombre, horas:s.horas, mod:s.mod, ser:s.seriacion||'',
    docente:'', correo:'', aula:'', color:subColor(i)
  }));
}
function ensureGroups(){
  const lic=S.setup.lic;
  activeCuatris().forEach(cuatri=>{
    ['A','B','C','D'].forEach(grupo=>{
      const id=groupId(lic,cuatri,grupo);
      if(!S.grupos[id]){
        S.grupos[id]={ id, lic, cuatri, grupo, turno:'M', aula:'',
          subjects:buildSubjects(lic,cuatri), grid:{} };
      }
    });
  });
  save();
}
function groupsForCurrent(){
  const lic=S.setup.lic;
  return Object.values(S.grupos).filter(g=>g.lic===lic && activeCuatris().includes(g.cuatri))
    .sort((a,b)=>a.cuatri-b.cuatri || a.grupo.localeCompare(b.grupo));
}

/* Construye las filas de una cuadrícula semanal fusionando verticalmente
   los módulos consecutivos con la misma clave (mismas horas seguidas = un solo bloque con rowspan).
   `mods` es un arreglo de objetos {idx,label} (idx = índice absoluto de módulo). */
function weekRowsMerged(mods, getKey, fillTd, emptyTd, hhClass){
  const ND=DIAS.length, NM=mods.length, covered={};
  let rows='';
  for(let r=0; r<NM; r++){
    const mi=mods[r].idx;                        // índice absoluto para las claves del grid
    let tds='';
    for(let di=0; di<ND; di++){
      if(covered[di+'-'+r]) continue;            // ya cubierto por un bloque de arriba
      const key=getKey(di,mi);
      if(!key){ tds+=emptyTd(di,mi); continue; }
      let span=1;                                // medir cuántos módulos seguidos comparten la misma clave
      while(r+span<NM && getKey(di,mods[r+span].idx)===key){ covered[di+'-'+(r+span)]=true; span++; }
      tds+=fillTd(di,mi,span);
    }
    rows+=`<tr><td class="${hhClass}">${mods[r].label}</td>${tds}</tr>`;
  }
  return rows;
}
/* Estilo de relleno de una celda de horario ocupada.
   - conf (empalme de docente): fondo rojo claro, texto rojo.
   - ASIN (asincrónica): SIN color de fondo (no presencial) → fondo blanco,
     texto oscuro y borde punteado con el color de la materia.
   - PRES/CLIN: color sólido de la materia, texto blanco. */
function cellFill(color, mod, conf){
  if(conf) return `background:#fde7eb;color:var(--red-d)`;
  if(mod==='ASIN') return `background:#fff;color:#33343d;border:1.5px dashed ${color}`;
  return `background:${color};color:#fff`;
}
function weekGridHTML(g, kind){
  const isArmed = S.ui.armed && S.ui.armed.id===g.id && S.ui.armed.kind===kind;
  const getKey=(di,mi)=> g.grid[di+'-'+mi]||'';
  const fillTd=(di,mi,span)=>{
    const sub=g.subjects.find(s=>subId(s)===g.grid[di+'-'+mi]);
    const rs= span>1?` rowspan="${span}"`:'';
    const tconf = cellTeacherConflict(g,di,mi);
    return `<td class="slot block${tconf?' tconf':''}"${rs} style="${cellFill(sub.color, sub.mod, false)}"
      ondragover="onSlotDragOver(event)" ondragenter="this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')"
      ondrop="onSlotDrop(event,'${g.id}','${kind}',${di},${mi})"
      onclick="onSlotClick('${g.id}','${kind}',${di},${mi})"
      title="${esc(sub.nombre)}${span>1?` · bloque de ${span} h`:''}${tconf?' — ⚠️ empalme de docente con otro grupo':''} — clic para quitar el bloque">
      <span class="blab">${esc(abbr(sub.nombre))}${tconf?' ⚠️':''}</span>${span>1?`<span class="bspan">${span} h seguidas</span>`:''}</td>`;
  };
  const emptyTd=(di,mi)=> `<td class="slot empty ${isArmed?'armable':''}"
      ondragover="onSlotDragOver(event)" ondragenter="this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')"
      ondrop="onSlotDrop(event,'${g.id}','${kind}',${di},${mi})"
      onclick="onSlotClick('${g.id}','${kind}',${di},${mi})"
      title="Módulo vacío"></td>`;
  const rows=weekRowsMerged(modsOf(g),getKey,fillTd,emptyTd,'hh');
  return `<div class="gridwrap"><table class="week">
    <thead><tr><th class="hh">Hora</th>${DIAS.map(d=>`<th>${d}</th>`).join('')}</tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}
function abbr(n){ return n.length>16?n.slice(0,15)+'…':n; }
function countPlaced(g,id){ let n=0; for(const k in g.grid) if(g.grid[k]===id) n++; return n; }
function countersHTML(g, kind){
  const subs=g.subjects.map((s,i)=>({s,i}));
  return `<div class="counters">
    <div class="markhint"><span class="b">↧ Arrastra</span> una materia a un módulo del horario. En táctil: <span class="b">toca</span> la materia y luego el módulo. Para quitar, haz clic en el módulo.</div>
    ${subs.map(({s,i})=>{
      const p=countPlaced(g,subId(s)); const c=p===s.horas?'done':(p>s.horas?'over':'');
      const armed = S.ui.armed && S.ui.armed.id===g.id && S.ui.armed.kind===kind && S.ui.armed.sub===subId(s);
      return `<div class="cnt ${c} ${armed?'armed':''}" draggable="true"
        ondragstart="onMarkerDragStart(event,'${g.id}','${kind}',${i})"
        ondragend="onMarkerDragEnd()"
        onclick="armMarker('${g.id}','${kind}',${i})" title="Arrastra al horario o toca para seleccionar">

        ${esc(abbr(s.nombre))} <b>${p}/${s.horas}</b>${p===s.horas?' ✓':(p>s.horas?' ⚠️':'')}</div>`;
    }).join('')}

/* ---------- Drag & drop / colocación de materias ---------- */
let DRAG = null; // {id, kind, sub}
function objByKind(id,kind){ return kind==='g'?S.grupos[id]:S.recurses[id]; }
function onMarkerDragStart(ev,id,kind,i){
  const obj=objByKind(id,kind); if(!obj) return;
  DRAG={id,kind,sub:subId(obj.subjects[i])};
  try{ ev.dataTransfer.effectAllowed='copy'; ev.dataTransfer.setData('text/plain',DRAG.sub); }catch(e){}
}
function onMarkerDragEnd(){ DRAG=null; document.querySelectorAll('td.slot.dragover').forEach(td=>td.classList.remove('dragover')); }
function onSlotDragOver(ev){ ev.preventDefault(); try{ ev.dataTransfer.dropEffect='copy'; }catch(e){} }
function onSlotDrop(ev,id,kind,di,mi){
  ev.preventDefault(); ev.currentTarget.classList.remove('dragover');
  let sub = DRAG && DRAG.id===id && DRAG.kind===kind ? DRAG.sub : null;
  if(!sub){ try{ sub=ev.dataTransfer.getData('text/plain'); }catch(e){} }
  DRAG=null;
  if(!sub) return;
  placeSub(id,kind,di,mi,sub);
}
/* Intenta colocar una materia en (di,mi). Bloquea si el docente de esa materia
   ya tiene clase a la misma hora en otro grupo/recurse. Devuelve true si colocó. */
function tryPlace(obj,di,mi,sub){
  if(!obj.subjects.some(s=>subId(s)===sub)) return false;
  const doc=docenteOf(obj,sub);
  const conf=teacherConflictsAt(obj.id,di,mi,doc);
  if(conf.length){
    const c=conf[0];
    const donde = c.obj.grupo ? `${c.obj.lic.split(' ')[0]} ${groupCode(c.obj)}` : 'un recurse';
    alert(`No se colocó la materia.\n\nEl docente «${doc.trim()}» ya tiene clase a esa hora (${hourLabel(BASE_H+mi)}, ${DIAS[di]}) en ${donde}.\n\nLos horarios de un mismo docente no pueden empalmarse entre grupos. Cambia la hora, el grupo o el docente.`);
    return false;
  }
  obj.grid[di+'-'+mi]=sub; return true;
}
function placeSub(id,kind,di,mi,sub){
  const obj=objByKind(id,kind); if(!obj) return;
  if(tryPlace(obj,di,mi,sub)){ save(); render(); }
}
/* Respaldo táctil: tocar marcador para "armar", luego tocar módulos */
function armMarker(id,kind,i){
  const obj=objByKind(id,kind); if(!obj) return;
  const sub=subId(obj.subjects[i]);
  if(S.ui.armed && S.ui.armed.id===id && S.ui.armed.kind===kind && S.ui.armed.sub===sub) S.ui.armed=null;
  else S.ui.armed={id,kind,sub};
  save(); render();
}
function onSlotClick(id,kind,di,mi){
  const obj=objByKind(id,kind); if(!obj) return;
  const key=di+'-'+mi;
  if(S.ui.armed && S.ui.armed.id===id && S.ui.armed.kind===kind){
    if(tryPlace(obj,di,mi,S.ui.armed.sub)){ save(); render(); }
  } else if(obj.grid[key]){
    const val=obj.grid[key];
    // borrar todo el bloque contiguo (mismas horas seguidas con la misma materia)
    let m=mi; while(m>=0 && obj.grid[di+'-'+m]===val){ delete obj.grid[di+'-'+m]; m--; }
    m=mi+1; while(obj.grid[di+'-'+m]===val){ delete obj.grid[di+'-'+m]; m++; }
    save(); render();
  }
}
function setTurno(id,v){ const g=S.grupos[id]; g.turno=v; g.t0=null; g.t1=null; pruneGrid(g); save(); render(); }
function setGAula(id,v){ S.grupos[id].aula=v; save(); }
function setMod(id,i,v){ S.grupos[id].subjects[i].mod=v; save(); render(); }
function setSub(id,i,f,v){ S.grupos[id].subjects[i][f]=v; save(); render(); }
function setSlot(id,kind,di,mi,v){
  const obj = kind==='g'?S.grupos[id]:S.recurses[id];
  const key=di+'-'+mi;
  if(v) obj.grid[key]=v; else delete obj.grid[key];
  save(); render();
}
/* Elimina del grid las celdas fuera de la ventana de horas vigente del objeto. */
function pruneGrid(obj){ const w=winOf(obj); for(const k in obj.grid){ const mi=parseInt(k.split('-')[1],10); const h=BASE_H+mi; if(h<w.t0||h>=w.t1) delete obj.grid[k]; } }
/* Ajusta la ventana de horas de un grupo: edge 'start'|'end', delta -1|+1.
   start -1 = entrar más temprano; start +1 = quitar la primera hora;
   end +1 = salir más tarde; end -1 = quitar la última hora. */
function adjHours(id, edge, delta){
  const g=S.grupos[id]; if(!g) return;
  const w=winOf(g); let {t0,t1}=w;
  if(edge==='start'){ t0+=delta; if(t0<MIN_H){ alert('No se puede entrar antes de las '+hourLabel(MIN_H).split(' ')[0]+'.'); return; } if(t0>=t1){ alert('El grupo debe tener al menos una hora de clase.'); return; } }
  else { t1+=delta; if(t1>MAX_H+1){ alert('No se puede salir después de las '+String(MAX_H+1).padStart(2,'0')+':00.'); return; } if(t1<=t0){ alert('El grupo debe tener al menos una hora de clase.'); return; } }
  // Si al recortar se quitan módulos con materias, pedir confirmación.
  const removing = (edge==='start'&&delta>0) || (edge==='end'&&delta<0);
  if(removing){
    const lostHour = (edge==='start') ? w.t0 : (w.t1-1);
    const mi = lostHour-BASE_H;
    const hasData = DIAS.some((d,di)=> !!g.grid[di+'-'+mi]);
    if(hasData && !confirm(`La hora ${hourLabel(lostHour)} tiene materias colocadas. Si la quitas se borrarán esas celdas. ¿Continuar?`)) return;
  }
  g.t0=t0; g.t1=t1; pruneGrid(g); save(); render();
}

function itemObj(it){ return it.type==='g'?S.grupos[it.id]:S.recurses[it.id]; }

function alumnoSchedule(a){
  // Build a merged schedule per turno. Collect all placements keyed by turno-day-mod.
  // Detect conflicts (same turno/day/mod used by 2+ items).
  const cells={M:{},V:{}}; // turno -> key -> [{label,color,obj}]
  let confCount=0;
  a.items.forEach(it=>{
    const o=itemObj(it); if(!o) return;
    const s=o.subjects.find(x=>subId(x)===it.sub); if(!s) return;
    const tn=o.turno;
    for(const k in o.grid){ if(o.grid[k]===it.sub){
      cells[tn][k]=cells[tn][k]||[];
      cells[tn][k].push({label:s.nombre,color:s.color,mod:s.mod,src:o});
    }}
  });
  ['M','V'].forEach(tn=>{ for(const k in cells[tn]) if(cells[tn][k].length>1) confCount++; });

  function modsForTurno(tn){
    const t=TURNOS[tn]; let lo=t.t0-BASE_H, hi=t.t1-1-BASE_H;
    for(const k in cells[tn]){ const mi=parseInt(k.split('-')[1],10); if(mi<lo)lo=mi; if(mi>hi)hi=mi; }
    const a=[]; for(let mi=lo; mi<=hi; mi++) a.push({idx:mi, label:hourLabel(BASE_H+mi)}); return a;
  }
  function gridFor(tn){
    let used=false; let rows='';
    modsForTurno(tn).forEach(m=>{
      const mi=m.idx; let tds='';
      DIAS.forEach((d,di)=>{
        const arr=cells[tn][di+'-'+mi];
        if(arr&&arr.length){ used=true;
          const conf=arr.length>1;
          const c=arr[0].color;
          tds+=`<td class="slot ${conf?'conf':''}" style="${cellFill(c, arr[0].mod, conf)};font-size:10.5px;font-weight:700;text-align:center;padding:3px" title="${esc(arr.map(x=>x.label).join(' / '))}">${esc(abbr(arr[0].label))}${conf?' ⚠':''}</td>`;
        } else tds+=`<td class="slot empty" style="text-align:center;color:#c7cde0">·</td>`;
      });
      rows+=`<tr><td class="hh">${m.label}</td>${tds}</tr>`;
    });
    if(!used) return '';
    return `<h4 style="margin:14px 0 6px;color:var(--navy-d)">${TURNOS[tn].nom}</h4>
      <div class="gridwrap"><table class="week"><thead><tr><th class="hh">Hora</th>${DIAS.map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div>`;
  }
  return `<div class="card">
    <div class="toolbar"><h3 style="margin:0">Horario personal · ${esc(a.nombre)}</h3><div class="spacer"></div>
      <button class="btn btn-line btn-sm" onclick="printAlumno('${a.id}')">🖨️ Imprimir / PDF</button></div>
    ${confCount?`<div class="conflict-banner">⚠️ Hay ${confCount} empalme(s) de horario marcados en rojo. Revisa los módulos en conflicto.</div>`:''}
    ${gridFor('M')}${gridFor('V')}
    <div style="margin-top:14px">
      <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px">MATERIAS CARGADAS</div>
      <table class="subtable"><thead><tr><th>Materia</th><th>Origen</th><th>Docente</th><th>Modalidad</th></tr></thead><tbody>
      ${a.items.map(it=>{const o=itemObj(it); if(!o)return''; const s=o.subjects.find(x=>subId(x)===it.sub); if(!s)return''; return `<tr>
        <td class="nm" style="border-left:3px solid ${s.color};padding-left:8px">${esc(s.nombre)}</td>
        <td>${it.type==='g'?esc(o.lic.split(' ')[0]+' '+groupCode(o)):'Recurse'}</td>
        <td>${esc(s.docente||'—')}</td><td>${modPill(s.mod)}</td></tr>`;}).join('')}
      </tbody></table>
    </div>
  </div>`;
}

function listTeachers(){
  const map=new Map(); // normKey -> {name, count}
  allSchedObjs().forEach(obj=>{ obj.subjects.forEach(s=>{ const d=(s.docente||'').trim(); if(!d) return;
    const k=normDoc(d); const placed=countPlaced(obj,subId(s));
    if(!map.has(k)) map.set(k,{name:d, mats:0, placed:0});
    const e=map.get(k); e.mats++; e.placed+=placed; }); });
  return [...map.entries()].map(([k,v])=>({key:k,...v})).sort((a,b)=>a.name.localeCompare(b.name,'es'));
}
/* Celdas (di-mi -> [{label,color,where}]) de todas las clases colocadas de un docente. */
function teacherCells(nkey){
  const cells={};
  allSchedObjs().forEach(obj=>{ obj.subjects.forEach(s=>{ if(normDoc(s.docente)!==nkey) return; const sid=subId(s);
    for(const k in obj.grid){ if(obj.grid[k]===sid){ (cells[k]=cells[k]||[]).push(
      {label:s.nombre, color:s.color, mod:s.mod, where: obj.grupo?`${obj.lic.split(' ')[0]} ${groupCode(obj)}`:'Recurse'}); } } }); });
  return cells;
}
function teacherModRange(cells){
  let lo=null,hi=null;
  for(const k in cells){ const mi=parseInt(k.split('-')[1],10); if(lo==null||mi<lo)lo=mi; if(hi==null||mi>hi)hi=mi; }
  if(lo==null){ lo=7-BASE_H; hi=15-1-BASE_H; }            // por defecto 07–15 si no hay nada
  const a=[]; for(let mi=lo; mi<=hi; mi++) a.push({idx:mi,label:hourLabel(BASE_H+mi)}); return a;
}
function teacherScheduleHTML(nkey){
  const cells=teacherCells(nkey);
  let conf=0; for(const k in cells) if(cells[k].length>1) conf++;
  let rows='';
  teacherModRange(cells).forEach(m=>{ const mi=m.idx; let tds='';
    DIAS.forEach((d,di)=>{ const arr=cells[di+'-'+mi];
      if(arr&&arr.length){ const c=arr.length>1; const col=arr[0].color;
        tds+=`<td class="slot ${c?'conf':''}" style="${cellFill(col, arr[0].mod, c)};font-size:10px;font-weight:700;text-align:center;padding:3px" title="${esc(arr.map(x=>x.label+' ('+x.where+')').join(' / '))}">${esc(abbr(arr[0].label))}<div style="font-size:9px;opacity:.9">${esc(arr[0].where)}</div>${c?' ⚠':''}</td>`;
      } else tds+=`<td class="slot empty" style="text-align:center;color:#c7cde0">·</td>`; });
    rows+=`<tr><td class="hh">${m.label}</td>${tds}</tr>`; });
  return {conf, html:`<div class="gridwrap"><table class="week"><thead><tr><th class="hh">Hora</th>${DIAS.map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div>`};
}
function viewDocentes(){
  const teachers=listTeachers();
  const sel = S.ui.docenteSel && teachers.some(t=>t.key===S.ui.docenteSel) ? S.ui.docenteSel : null;
  const confs=allTeacherConflicts();
  let body;
  if(!teachers.length){
    body=`<div class="card"><p class="hint" style="margin:0">Aún no hay docentes. Escribe el nombre del docente en cada materia (pestaña «Grupos activos») y aquí aparecerá su horario combinado.</p></div>`;
  } else {
    const t = sel ? teacherScheduleHTML(sel) : null;
    const selName = sel ? teachers.find(x=>x.key===sel).name : '';
    body=`
    ${confs.length?`<div class="conflict-banner">⚠️ Hay ${confs.length} empalme(s) de docente entre grupos. Revisa los docentes marcados con ⚠️ y corrige las celdas en rojo.</div>`:''}
    <div class="card">
      <h3 style="margin-top:0">Selecciona un docente</h3>
      <p class="hint">Su horario combina las clases de todos los grupos y recurses. Un mismo docente no puede tener dos clases a la misma hora.</p>
      <div class="chips">
        ${teachers.map(t=>{ const hasConf=confs.some(c=>normDoc(c.doc)===t.key);
          return `<button class="chip ${sel===t.key?'active':''}" onclick="selDocente('${encodeURIComponent(t.key)}')">${esc(t.name)}${hasConf?' ⚠️':''}<span class="tg">${t.placed} h</span></button>`;}).join('')}
      </div>
    </div>
    ${sel?`<div class="card">
      <div class="toolbar"><h3 style="margin:0">Horario · ${esc(selName)}</h3><div class="spacer"></div>
        <button class="btn btn-line btn-sm" onclick="printTeacher('${encodeURIComponent(sel)}')">🖨️ Imprimir / PDF</button></div>
      ${t.conf?`<div class="conflict-banner">⚠️ Este docente tiene ${t.conf} empalme(s): clases distintas a la misma hora. Corrígelas en los grupos correspondientes.</div>`:''}
      ${t.html}
      <div style="margin-top:14px"><div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px">CLASES ASIGNADAS</div>
      <table class="subtable"><thead><tr><th>Materia</th><th>Grupo / Origen</th><th>Horas colocadas</th></tr></thead><tbody>
      ${teacherRows(sel)}
      </tbody></table></div>
    </div>`:''}`;
  }
  return `
  <div class="section-head"><div class="bar"></div>
    <h2>Docentes</h2>
    <div class="sub">Horario individual por docente · impresión y control de empalmes</div></div>
  <div class="card" style="padding:14px 22px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-primary" onclick="printAllTeachers()">🖨️ Imprimir todos los docentes (${teachers.length})</button>
    <span class="hint" style="margin:0">En el diálogo de impresión elige «Guardar como PDF» para guardar o subir a Drive.</span>
  </div>
  ${body}`;
}
function teacherRows(nkey){
  const out=[];
  allSchedObjs().forEach(obj=>{ obj.subjects.forEach(s=>{ if(normDoc(s.docente)!==nkey) return;
    const placed=countPlaced(obj,subId(s)); if(placed===0 && s.mod!=='ASIN') {/* incluir igual para visibilidad */}
    out.push({nm:s.nombre, color:s.color, where: obj.grupo?`${obj.lic.split(' ')[0]} ${groupCode(obj)}`:`Recurse`, placed, mod:s.mod}); }); });
  if(!out.length) return `<tr><td colspan="3" style="color:var(--muted)">Sin materias.</td></tr>`;
  return out.map(o=>`<tr><td class="nm" style="border-left:3px solid ${o.color};padding-left:8px">${esc(o.nm)} ${modPill(o.mod)}</td><td>${esc(o.where)}</td><td>${o.placed+' h'}</td></tr>`).join('');
}
function selDocente(k){ S.ui.docenteSel=decodeURIComponent(k); save(); render(); }

/* ============================================================
   TAB 5 — Exportar
   ============================================================ */
function viewExport(){
  const ng=groupsForCurrent().length, nr=Object.keys(S.recurses).length, na=Object.keys(S.alumnos).length;
  return `
  <div class="section-head"><div class="bar"></div>
    <h2>Exportar y respaldo</h2>
    <div class="sub">PDF, hoja de cálculo (Drive/Sheets) y respaldo de datos</div></div>
  <div class="grid2">
    <div class="card"><h3>🖨️ PDF / Impresión</h3>
      <p class="hint">Genera una versión imprimible con formato institucional. En el diálogo de impresión elige <b>«Guardar como PDF»</b>.</p>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="btn btn-primary" onclick="printAllGroups()">Imprimir todos los grupos activos (${ng})</button>
        <button class="btn btn-line" onclick="printAllRecurses()">Imprimir todos los recurses (${nr})</button>
        <button class="btn btn-line" onclick="printAllTeachers()">Imprimir todos los docentes (${listTeachers().length})</button>
      </div>
    </div>
    <div class="card"><h3>📄 Hoja de cálculo (para Drive / Sheets)</h3>
      <p class="hint">Descarga un archivo <b>.csv</b> con todas las asignaciones. Súbelo a tu Google Drive o ábrelo en Google Sheets / Excel.</p>
      <button class="btn btn-red" onclick="exportCSV()">⬇️ Descargar CSV de asignaciones</button>
      <p class="hint" style="margin-top:12px">No estoy seguro de poder subir directamente a tu Drive desde aquí (requeriría iniciar sesión en tu cuenta), por eso la vía confiable es descargar y subir el archivo. </p>
    </div>
    <div class="card"><h3>💾 Respaldo de datos (.json)</h3>
      <p class="hint">Guarda <b>todo</b> tu trabajo (grupos, recurses, alumnos) en un archivo para reabrirlo después o pasarlo a otra computadora.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="exportJSON()">⬇️ Descargar respaldo</button>
        <button class="btn btn-line" onclick="document.getElementById('impFile').click()">⬆️ Importar respaldo</button>
        <input type="file" id="impFile" accept=".json" class="hidden" onchange="importJSON(this)">
      </div>
    </div>
    <div class="card"><h3>📊 Resumen</h3>
      <table class="subtable"><tbody>
        <tr><td>Licenciatura</td><td><b>${esc(S.setup.lic)}</b></td></tr>
        <tr><td>Ciclo</td><td><b>${cycleCode()}</b> · ${esc(periodLabel())}</td></tr>
        <tr><td>Grupos activos</td><td><b>${ng}</b></td></tr>
        <tr><td>Recurses</td><td><b>${nr}</b></td></tr>
        <tr><td>Horarios individuales</td><td><b>${na}</b></td></tr>
      </tbody></table>
      <button class="btn btn-line btn-sm" style="margin-top:12px;color:var(--red);border-color:#f3c6cf" onclick="resetAll()">🗑️ Borrar todo y reiniciar</button>
    </div>
  </div>`;
}

function exportCSV(){
  const rows=[['Tipo','Licenciatura','Ciclo','Grupo/Recurse','Cuatrimestre','Turno','Clave','Asignatura','Modalidad','HorasUPP','HorasAsignadas','Docente','Correo','Aula']];
  Object.values(S.grupos).forEach(g=>g.subjects.forEach(s=>{
    rows.push(['Grupo',g.lic,cycleCode(),groupCode(g),g.cuatri+'°',TURNOS[g.turno].nom,s.clave,s.nombre,s.mod,s.horas,countPlaced(g,subId(s)),s.docente,s.correo,s.aula||g.aula]);
  }));
  Object.values(S.recurses).forEach(r=>{const s=r.subjects[0];
    rows.push(['Recurse',r.lic,cycleCode(),'Recurse '+s.nombre,r.cuatri+'°',TURNOS[r.turno].nom,s.clave,s.nombre,s.mod,s.horas,countPlaced(r,subId(s)),s.docente,s.correo,r.aula]);
  });
  const csv=rows.map(r=>r.map(c=>{c=(c==null?'':String(c)); return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(',')).join('\n');
  download('\ufeff'+csv,`Horarios_${LIC_META[S.setup.lic].ab}_${S.setup.anio}-${S.setup.parte}.csv`,'text/csv;charset=utf-8');
}
function exportJSON(){ download(JSON.stringify(S,null,1),`Respaldo_Horarios_${cycleCode().replace('/','-')}.json`,'application/json'); }
function importJSON(inp){ const f=inp.files[0]; if(!f)return; const rd=new FileReader();
  rd.onload=()=>{ try{ const o=JSON.parse(rd.result); if(o&&o.setup){ S=o; save(); render(); alert('Respaldo importado.'); } else alert('Archivo no válido.'); }catch(e){ alert('No se pudo leer el archivo.'); } };
  rd.readAsText(f); }
function resetAll(){ if(confirm('Esto borrará TODOS los grupos, recurses y alumnos. ¿Continuar?')){ S=blankState(); save(); render(); } }
function download(text,name,type){ const b=new Blob([text],{type}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1500); }

/* ============================================================
   IMPRESIÓN (PDF) — formato institucional
   ============================================================ */
function pHead(sub){
  return `<div class="phead"><img class="plogo" src="${window.LOGO_H}">
    <div><div class="pt1">Universidad Privada de la Península · Coordinación de Salud</div>
    <div class="pt2">${esc(sub)}</div></div>
    <div class="pcycle"><div class="c1">Ciclo</div><div class="c2">${esc(cycleCode())}</div></div></div>`;
}
function pMeta(items){ return `<div class="pmeta">${items.map(it=>`<div class="m"><span class="k">${esc(it[0])}</span><span class="v">${esc(it[1])}</span></div>`).join('')}</div>`; }
function pFoot(left){ return `<div class="pfoot"><span>${esc(left)}</span><span>Ciclo <b>${esc(cycleCode())}</b> · ${esc(periodLabel())}</span></div>`; }
function groupPrintSheet(g){
  const t=TURNOS[g.turno];
  const subRows=g.subjects.map(s=>`<tr><td class="pc" style="color:${s.color}">${esc(s.clave||'—')}</td><td>${esc(s.nombre)}</td>
    <td>${({PRES:'Presencial',ASIN:'Asincrónica',CLIN:'Clínica'})[s.mod]}</td><td>${s.horas}</td>
    <td>${esc(s.docente||'—')}</td><td>${esc(s.correo||'—')}</td><td>${esc(s.aula||g.aula||'—')}</td></tr>`).join('');
  let weekRows=weekRowsMerged(modsOf(g),
    (di,mi)=> g.grid[di+'-'+mi]||'',
    (di,mi,span)=>{ const s=g.subjects.find(x=>subId(x)===g.grid[di+'-'+mi]); const rs=span>1?` rowspan="${span}"`:'';
      return `<td${rs} style="${cellFill(s.color, s.mod, false)}">${esc(s.nombre)}</td>`; },
    ()=>`<td class="pempty"></td>`, 'phh');
  return `<div class="psheet">${pHead(`${esc(g.lic)} · Horario grupal`)}
    ${pMeta([['Grupo',`${g.lic.split(' ')[0]} ${groupCode(g)}`],['Cuatrimestre',`${g.cuatri}°`],['Turno',t.nom],['Horario',winLabel(g)],['Aula base',g.aula||'—'],['Periodo',periodLabel()]])}
    <div class="psec">Asignaturas y docentes</div>
    <table class="ptable"><thead><tr><th>Clave</th><th>Asignatura</th><th>Modalidad</th><th>UPP</th><th>Docente</th><th>Correo</th><th>Aula</th></tr></thead><tbody>${subRows}</tbody></table>
    <div class="psec">Horario semanal · ${esc(t.nom)}</div>
    <table class="pweek"><thead><tr><th class="phh">Hora</th>${DIAS.map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody>${weekRows}</tbody></table>
    ${pFoot('Generador de Horarios · Área de Salud')}</div>`;
}
function recursePrintSheet(r){
  const s=r.subjects[0]; const t=TURNOS[r.turno];
  let weekRows=weekRowsMerged(modsOf(r),
    (di,mi)=> r.grid[di+'-'+mi]===subId(s) ? subId(s) : '',
    (di,mi,span)=>{ const rs=span>1?` rowspan="${span}"`:''; return `<td${rs} style="${cellFill(s.color, s.mod, false)}">${esc(s.nombre)}</td>`; },
    ()=>`<td class="pempty"></td>`, 'phh');
  return `<div class="psheet">${pHead(`${esc(r.lic)} · Recurse`)}
    ${pMeta([['Materia',s.nombre],['Cuatri. origen',`${r.cuatri}°`],['Turno',t.nom],['Docente',s.docente||'—'],['Aula',r.aula||'—']])}
    <div class="psec">Horario semanal · ${esc(t.nom)}</div>
    <table class="pweek"><thead><tr><th class="phh">Hora</th>${DIAS.map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody>${weekRows}</tbody></table>
    ${pFoot(`Recurse · ${esc(r.lic)}`)}</div>`;
}
function alumnoPrintSheet(a){
  const cells={M:{},V:{}};
  a.items.forEach(it=>{const o=itemObj(it); if(!o)return; const s=o.subjects.find(x=>subId(x)===it.sub); if(!s)return; for(const k in o.grid) if(o.grid[k]===it.sub){cells[o.turno][k]=cells[o.turno][k]||[];cells[o.turno][k].push({label:s.nombre,color:s.color,mod:s.mod});}});
  function modsForTurno(tn){ const t=TURNOS[tn]; let lo=t.t0-BASE_H, hi=t.t1-1-BASE_H;
    for(const k in cells[tn]){ const mi=parseInt(k.split('-')[1],10); if(mi<lo)lo=mi; if(mi>hi)hi=mi; }
    const a=[]; for(let mi=lo; mi<=hi; mi++) a.push({idx:mi, label:hourLabel(BASE_H+mi)}); return a; }
  function grid(tn){let used=false;
    const at=(di,mi)=>cells[tn][di+'-'+mi];
    const getKey=(di,mi)=>{const arr=at(di,mi); if(!arr||!arr.length)return''; return arr.length>1?('CONF|'+arr[0].label):('OK|'+arr[0].color+'|'+arr[0].label);};
    const fillTd=(di,mi,span)=>{const arr=at(di,mi);used=true;const conf=arr.length>1;const rs=span>1?` rowspan="${span}"`:'';
      return `<td${rs} style="${cellFill(arr[0].color, arr[0].mod, conf)}">${esc(arr[0].label)}${conf?' ⚠':''}</td>`;};
    const rows=weekRowsMerged(modsForTurno(tn),getKey,fillTd,()=>'<td class="pempty"></td>','phh');
    if(!used)return'';return `<div class="psec">${TURNOS[tn].nom}</div><table class="pweek"><thead><tr><th class="phh">Hora</th>${DIAS.map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table>`;}
  const matRows=a.items.map(it=>{const o=itemObj(it);if(!o)return''; const s=o.subjects.find(x=>subId(x)===it.sub); if(!s)return''; return `<tr><td>${esc(s.nombre)}</td><td>${it.type==='g'?esc(o.lic.split(' ')[0]+' '+groupCode(o)):'Recurse'}</td><td>${esc(s.docente||'—')}</td></tr>`;}).join('');
  return `<div class="psheet">${pHead('Horario individual')}
    ${pMeta([['Alumno',a.nombre]].concat(a.matricula?[['Matrícula',a.matricula]]:[]).concat([['Caso',a.tipo],['Periodo',periodLabel()]]))}
    ${grid('M')}${grid('V')}
    <div class="psec">Materias cargadas</div>
    <table class="ptable"><thead><tr><th>Materia</th><th>Origen</th><th>Docente</th></tr></thead><tbody>${matRows}</tbody></table>
    ${pFoot(`Horario individual · ${esc(a.nombre)}`)}</div>`;
}
function doPrint(html){ document.getElementById('printArea').innerHTML=html; window.print(); }
function printGroup(id){ doPrint(groupPrintSheet(S.grupos[id])); }
function printRecurse(id){ doPrint(recursePrintSheet(S.recurses[id])); }
function printAlumno(id){ doPrint(alumnoPrintSheet(S.alumnos[id])); }
function printAllGroups(){ const gs=groupsForCurrent(); if(!gs.length){alert('No hay grupos.');return;} doPrint(gs.map(groupPrintSheet).join('')); }
function printAllRecurses(){ const rs=Object.values(S.recurses); if(!rs.length){alert('No hay recurses.');return;} doPrint(rs.map(recursePrintSheet).join('')); }

function teacherPrintSheet(nkey){
  const cells=teacherCells(nkey);
  const teachers=listTeachers(); const tobj=teachers.find(t=>t.key===nkey);
  const name=tobj?tobj.name:nkey;
  let conf=0; for(const k in cells) if(cells[k].length>1) conf++;
  const getKey=(di,mi)=>{ const arr=cells[di+'-'+mi]; if(!arr||!arr.length) return ''; return (arr.length>1?'C|':'O|')+arr[0].color+'|'+arr[0].label+'|'+arr[0].where; };
  const fillTd=(di,mi,span)=>{ const arr=cells[di+'-'+mi]; const c=arr.length>1; const rs=span>1?` rowspan="${span}"`:'';
    return `<td${rs} style="${cellFill(arr[0].color, arr[0].mod, c)}">${esc(arr[0].label)}<div style="font-size:8.5px;opacity:.9">${esc(arr[0].where)}</div>${c?' ⚠':''}</td>`; };
  const weekRows=weekRowsMerged(teacherModRange(cells),getKey,fillTd,()=>'<td class="pempty"></td>','phh');
  const matRows=[];
  allSchedObjs().forEach(obj=>{ obj.subjects.forEach(s=>{ if(normDoc(s.docente)!==nkey) return;
    matRows.push(`<tr><td>${esc(s.nombre)}</td><td>${obj.grupo?esc(obj.lic.split(' ')[0]+' '+groupCode(obj)):'Recurse'}</td><td>${countPlaced(obj,subId(s))+' h'}</td></tr>`); }); });
  return `<div class="psheet">${pHead('Horario del docente')}
    ${pMeta([['Docente',name],['Periodo',periodLabel()]].concat(conf?[['Empalmes','⚠️ '+conf]]:[]))}
    ${conf?`<div style="background:#fde7eb;border:1px solid #e4133a;color:#c20f30;border-radius:8px;padding:6px 10px;font-size:10px;font-weight:700;margin-bottom:6px">⚠️ Este docente tiene ${conf} empalme(s) de horario (celdas en rojo).</div>`:''}
    <div class="psec">Horario semanal</div>
    <table class="pweek"><thead><tr><th class="phh">Hora</th>${DIAS.map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody>${weekRows}</tbody></table>
    <div class="psec">Clases asignadas</div>
    <table class="ptable"><thead><tr><th>Materia</th><th>Grupo / Origen</th><th>Horas</th></tr></thead><tbody>${matRows.join('')}</tbody></table>
    ${pFoot(`Horario del docente · ${esc(name)}`)}</div>`;
}
function printTeacher(k){ doPrint(teacherPrintSheet(decodeURIComponent(k))); }
function printAllTeachers(){ const ts=listTeachers(); if(!ts.length){alert('No hay docentes con nombre asignado.');return;} doPrint(ts.map(t=>teacherPrintSheet(t.key)).join('')); }

/* init */
document.addEventListener('DOMContentLoaded',()=>{ document.getElementById('logoTop').src=window.LOGO_H; render(); });
